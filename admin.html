<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Desarrollador de SOPs Nazaria</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F4F4F4] font-['Inter'] text-neutral-900 min-h-screen flex flex-col">

    <!-- Header Operativo Minimalista -->
    <header class="bg-white border-b border-neutral-200 px-8 py-4 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="bg-neutral-900 text-white w-8 h-8 flex items-center justify-center rounded font-bold tracking-wider text-xs">
                HQ
            </div>
            <div>
                <h1 class="text-sm font-bold text-black tracking-widest uppercase">
                    NAZARIA OPS <span class="ml-2 text-[9px] font-bold bg-[#E6D5C3] text-neutral-800 px-2 py-0.5 rounded tracking-normal">ADMIN CONTROL</span>
                </h1>
                <p class="text-[11px] text-neutral-500">Consola de Actualización Automatizada por API</p>
            </div>
        </div>

        <!-- Inputs de Credenciales -->
        <div class="flex flex-wrap items-center gap-2">
            <input type="password" id="gemini-key" placeholder="Gemini API Key" class="bg-neutral-50 border border-neutral-200 rounded px-3 py-1.5 text-xs focus:outline-none focus:border-neutral-900 text-neutral-800 w-44">
            <input type="password" id="github-token" placeholder="GitHub Personal Token (PAT)" class="bg-neutral-50 border border-neutral-200 rounded px-3 py-1.5 text-xs focus:outline-none focus:border-neutral-900 text-neutral-800 w-52">
            <button onclick="saveKeys()" class="bg-neutral-900 hover:bg-black text-white font-semibold text-xs px-4 py-1.5 rounded transition shadow-sm">
                Guardar Llaves
            </button>
        </div>
    </header>

    <!-- Workspace Principal -->
    <div class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden">
        
        <!-- Formulario (Izquierda) -->
        <div class="lg:col-span-5 flex flex-col space-y-4">
            <div class="bg-white border border-neutral-200 rounded p-5 shadow-sm space-y-4">
                
                <div>
                    <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-2">1. Seleccionar Manual Destino</label>
                    <select id="sop-selector" onchange="fetchCurrentSOP()" class="w-full bg-neutral-50 border border-neutral-200 rounded p-2.5 text-xs focus:outline-none focus:border-neutral-900 text-neutral-800 font-medium">
                        <option value="">-- Seleccionar SOP a Modificar --</option>
                        <option value="p01">P-01 · Atención al Cliente y Ventas</option>
                        <option value="p02">P-02 · Operación de Caja y Pagos</option>
                        <option value="p03">P-03 · Orden y Estética del Local</option>
                        <option value="p04">P-04 · Posventa y Cambios</option>
                        <option value="p05">P-05 · Recepción y Stock</option>
                        <option value="p06">P-06 · Gestión de Gift Cards</option>
                        <option value="p07">P-07 · Venta Activa y Omnicanalidad</option>
                    </select>
                </div>

                <div id="github-status" class="text-[11px] bg-neutral-50 border border-neutral-200 p-3 rounded text-neutral-500 flex items-center justify-between">
                    <span>Estado en Servidor:</span>
                    <span class="font-bold text-neutral-400 text-xs" id="status-label">No seleccionado</span>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-2">2. Orden de Modificación (Texto Plano)</label>
                    <textarea id="instruction-input" rows="6" placeholder="Escribí acá el cambio en lenguaje natural. Ej: Cambiá el día de recuento de stock en TOM a los viernes por la mañana..." class="w-full bg-neutral-50 border border-neutral-200 rounded p-3 text-xs focus:outline-none focus:border-neutral-900 text-neutral-800 placeholder-neutral-400 resize-none leading-relaxed"></textarea>
                </div>

                <button onclick="processSOPModification()" id="btn-process" class="w-full bg-black hover:bg-neutral-800 font-bold text-xs text-white py-3 rounded uppercase tracking-widest transition shadow-sm flex items-center justify-center space-x-2">
                    <span>Ejecutar Modificación e Inyectar</span>
                </button>
            </div>

            <!-- Consola -->
            <div class="bg-white border border-neutral-200 rounded p-4 flex-1 flex flex-col min-h-[160px] shadow-sm">
                <div class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-2">Registro de Eventos API</div>
                <div id="console-output" class="flex-1 bg-neutral-50 border border-neutral-100 rounded p-3 text-[11px] font-mono text-neutral-600 overflow-y-auto max-h-[200px] space-y-1 select-text">
                    > Consola lista. Esperando selección de procedimiento.
                </div>
            </div>
        </div>

        <!-- Código Resultante (Derecha) -->
        <div class="lg:col-span-7 flex flex-col">
            <div class="bg-white border border-neutral-200 rounded p-5 flex-1 flex flex-col shadow-sm overflow-hidden relative">
                <div class="absolute top-0 left-0 right-0 h-1 bg-[#E6D5C3]"></div>
                <div class="flex items-center justify-between mb-3 mt-1">
                    <label class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">Código HTML Técnico Resultante</label>
                    <span class="text-[10px] bg-neutral-100 px-2 py-0.5 rounded text-neutral-500 font-mono" id="file-path-indicator">sops/??.html</span>
                </div>
                <textarea id="code-output" readonly class="flex-1 w-full bg-neutral-50 border border-neutral-100 rounded p-4 text-xs font-mono text-neutral-700 focus:outline-none resize-none overflow-y-auto select-all" placeholder="<!-- El código estructurado final se generará acá automáticamente -->"></textarea>
            </div>
        </div>

    </div>

    <!-- Script de Automatización Estricta -->
    <script>
        const GITHUB_USER = "juanoviedo1987-droid";
        const GITHUB_REPO = "sops-nazaria";
        let currentSopSha = null;
        let currentSopRawContent = "";

        window.onload = function() {
            if (localStorage.getItem('gemini_key')) document.getElementById('gemini-key').value = localStorage.getItem('gemini_key');
            if (localStorage.getItem('github_token')) document.getElementById('github-token').value = localStorage.getItem('github_token');
        };

        function saveKeys() {
            localStorage.setItem('gemini_key', document.getElementById('gemini-key').value.trim());
            localStorage.setItem('github_token', document.getElementById('github-token').value.trim());
            logToConsole("Credenciales operativas guardadas localmente.");
        }

        function logToConsole(msg, isError = false) {
            const consoleBox = document.getElementById('console-output');
            const time = new Date().toLocaleTimeString();
            const colorClass = isError ? "text-red-600" : "text-neutral-900 font-medium";
            consoleBox.innerHTML += `<div class="py-0.5"><span class="text-neutral-400">[${time}]</span> <span class="${colorClass}">${msg}</span></div>`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        async function fetchCurrentSOP() {
            const sopCode = document.getElementById('sop-selector').value;
            const statusLabel = document.getElementById('status-label');
            const pathIndicator = document.getElementById('file-path-indicator');
            const codeOutput = document.getElementById('code-output');
            const token = localStorage.getItem('github_token');

            if (!sopCode) {
                statusLabel.innerText = "No seleccionado";
                statusLabel.className = "font-bold text-neutral-400 text-xs";
                pathIndicator.innerText = "sops/??.html";
                codeOutput.value = "";
                return;
            }

            pathIndicator.innerText = `sops/${sopCode}.html`;
            statusLabel.innerText = "Sincronizando...";
            statusLabel.className = "font-bold text-amber-600 text-xs";
            logToConsole(`Buscando sops/${sopCode}.html en servidor...`);

            if (!token) {
                logToConsole("Error: Falta configurar Token de GitHub.", true);
                statusLabel.innerText = "Falta Token";
                statusLabel.className = "font-bold text-red-600 text-xs";
                return;
            }

            try {
                const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/sops/${sopCode}.html`;
                const response = await fetch(url, { headers: { "Authorization": `token ${token}` } });

                if (!response.ok) {
                    if (response.status === 404) {
                        logToConsole("Archivo nuevo. Se creará al procesar.");
                        currentSopSha = null;
                        currentSopRawContent = "";
                        statusLabel.innerText = "Nuevo Archivo";
                        statusLabel.className = "font-bold text-blue-600 text-xs";
                        return;
                    }
                    throw new Error(`Error API: ${response.status}`);
                }

                const data = await response.json();
                currentSopSha = data.sha;
                currentSopRawContent = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));
                codeOutput.value = currentSopRawContent;
                statusLabel.innerText = "Sincronizado (OK)";
                statusLabel.className = "font-bold text-neutral-900 text-xs";
                logToConsole(`SOP ${sopCode.toUpperCase()} cargado con éxito.`);
            } catch (error) {
                logToConsole(error.message, true);
                statusLabel.innerText = "Error Sincro";
                statusLabel.className = "font-bold text-red-600 text-xs";
            }
        }

        async function processSOPModification() {
            const sopCode = document.getElementById('sop-selector').value;
            const instruction = document.getElementById('instruction-input').value.trim();
            const geminiKey = localStorage.getItem('gemini_key');
            const token = localStorage.getItem('github_token');
            const btn = document.getElementById('btn-process');

            if (!sopCode || !instruction) {
                alert("Por favor, completá la selección y la orden de cambio.");
                return;
            }
            btn.disabled = true;
            btn.innerText = "Procesando Estructura Con IA...";

            const systemPrompt = `Actuás como un Ingeniero de Operaciones Senior. Tu objetivo es modificar un archivo de procedimiento HTML respetando estrictamente el formato corporativo minimalista P-00.
REGLAS DE DISEÑO EXIGIDAS (P-00):
- Título Principal del SOP: <h1 class="sop-title-1">CÓDIGO · Título</h1>
- Título de Fase Principal: <h2 class="sop-title-2">FASE X: NOMBRE EN MAYÚSCULAS</h2>
- Subtítulo de Sección: <h3 class="sop-title-3">X. Nombre de Sección</h3>
- Texto normal: <p class="sop-text">Contenido de párrafo</p>
- Listas de tareas: <ul class="sop-list"><li class="sop-list-item">✨ <strong>Clave:</strong> Detalle.</li></ul>
- Ejemplos concretos: <blockquote class="sop-blockquote">Ejemplo: "Texto descriptivo"</blockquote>
- Separadores visuales: <hr class="sop-divider">
- Alertas críticas de caja/control: <ul class="sop-warning-list"><li class="sop-warning-item">⚠ <strong>Advertencia:</strong> Regla de oro estricta.</li></ul>
No agregues bloques markdown ni wrappers externos <div>. Devolvé solo el código HTML limpio. Manténer la integridad de las secciones que no fueron alteradas por la orden.`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${geminiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `${systemPrompt}\n\nHTML ACTUAL:\n${currentSopRawContent}\n\nORDEN DE CAMBIO:\n${instruction}\n\nHTML MODIFICADO:` }] }] })
                });

                if (!response.ok) throw new Error("Error en motor de IA Gemini.");
                const resData = await response.json();
                let outputHtml = resData.candidates[0].content.parts[0].text.trim();

                if (outputHtml.startsWith("```html")) outputHtml = outputHtml.substring(7);
                if (outputHtml.endsWith("```")) outputHtml = outputHtml.substring(0, outputHtml.length - 3);
                outputHtml = outputHtml.trim();

                document.getElementById('code-output').value = outputHtml;
                logToConsole("Estructura de cambios aprobada por la IA.");

                await pushToGitHub(sopCode, outputHtml);
            } catch (error) {
                logToConsole(error.message, true);
            } finally {
                btn.disabled = false;
                btn.innerText = "Ejecutar Modificación e Inyectar";
            }
        }

        async function pushToGitHub(sopCode, content) {
            const token = localStorage.getItem('github_token');
            const base64Content = btoa(unescape(encodeURIComponent(content)));
            const payload = { message: `Ops Engine: Modificación automatizada en sops/${sopCode}.html`, content: base64Content };
            if (currentSopSha) payload.sha = currentSopSha;

            try {
                const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/sops/${sopCode}.html`;
                const response = await fetch(url, { method: 'PUT', headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" }, body: JSON.stringify(payload) });

                if (!response.ok) throw new Error("Error de escritura por API en GitHub.");
                const resData = await response.json();
                
                currentSopSha = resData.content.sha;
                currentSopRawContent = content;

                document.getElementById('status-label').innerText = "Actualizado en Servidor";
                document.getElementById('status-label').className = "font-bold text-neutral-950 text-xs";
                logToConsole(`¡Éxito! Cambios guardados e impactados en locales.`);
                document.getElementById('instruction-input').value = "";
                alert("¡Procedimiento modificado y distribuido de forma exitosa!");
            } catch (error) {
                logToConsole(error.message, true);
            }
        }
    </script>
</body>
</html>
