<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Operaciones - Manual de SOPs Oficiales</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Estructura de fuentes estricta del P-00 para la visualización del documento */
        .sop-container {
            font-family: 'Inter', sans-serif !important;
            line-height: 1.25 !important;
            color: #1A1A1A !important;
            font-size: 11pt !important;
        }
        .sop-title-1 {
            font-family: 'Inter', sans-serif !important;
            font-size: 22pt !important;
            font-weight: 700 !important;
            color: #000000 !important;
            margin-top: 0px !important;
            margin-bottom: 14pt !important;
            line-height: 1.25 !important;
            letter-spacing: -0.02em !important;
        }
        .sop-title-2 {
            font-family: 'Inter', sans-serif !important;
            font-size: 13pt !important;
            font-weight: 700 !important;
            color: #000000 !important;
            text-transform: uppercase !important;
            margin-top: 26pt !important;
            margin-bottom: 12pt !important;
            line-height: 1.25 !important;
            letter-spacing: 0.05em !important;
            border-bottom: 2px solid #1A1A1A;
            padding-bottom: 4px;
        }
        .sop-title-3 {
            font-family: 'Inter', sans-serif !important;
            font-size: 11pt !important;
            font-weight: 700 !important;
            color: #404040 !important;
            margin-top: 18pt !important;
            margin-bottom: 6pt !important;
            line-height: 1.25 !important;
        }
        .sop-text {
            margin-top: 0px !important;
            margin-bottom: 12pt !important;
            text-align: justify !important;
        }
        .sop-list {
            margin-top: 0px !important;
            margin-bottom: 12pt !important;
            padding-left: 15pt !important;
            list-style-type: none !important;
        }
        .sop-list-item {
            margin-bottom: 6pt !important;
            position: relative !important;
        }
        .sop-divider {
            border: none !important;
            border-top: 1px solid #E5E5E5 !important;
            margin-top: 24pt !important;
            margin-bottom: 24pt !important;
        }
        .sop-blockquote {
            margin-top: 0px !important;
            margin-bottom: 12pt !important;
            margin-left: 0px !important;
            margin-right: 0px !important;
            padding-left: 12pt !important;
            border-left: 2px solid #A3A3A3 !important;
            font-style: italic !important;
            color: #525252 !important;
        }
        .sop-warning-list {
            margin-top: 0px !important;
            margin-bottom: 12pt !important;
            padding-left: 15pt !important;
            list-style-type: none !important;
        }
        .sop-warning-item {
            margin-bottom: 8pt !important;
            color: #000000 !important;
            font-weight: 600 !important;
            background-color: #F5F5F5;
            padding: 10px 14px;
            border-left: 3px solid #000000;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-[#F4F4F4] font-['Inter'] text-neutral-900 min-h-screen flex flex-col">

    <!-- Header Principal Minimalista -->
    <header class="bg-white border-b border-neutral-200 px-8 py-5 flex items-center justify-between shadow-sm">
        <div class="flex items-center space-x-4">
            <div class="bg-black text-white px-3 py-1.5 rounded font-bold tracking-widest text-xs">
                NZ
            </div>
            <div>
                <h1 class="text-base font-bold tracking-widest text-black uppercase">
                    NAZARIA <span class="ml-2 text-[10px] font-bold bg-[#E6D5C3] text-neutral-800 px-2 py-0.5 rounded tracking-normal">OPERACIONES</span>
                </h1>
                <p class="text-[11px] text-neutral-500 tracking-wide mt-0.5">Base de Conocimiento y Manuales Técnicos</p>
            </div>
        </div>
        <div class="text-[11px] font-medium text-neutral-600 bg-white border border-neutral-200 px-3 py-1.5 rounded flex items-center shadow-sm">
            <span class="w-1.5 h-1.5 rounded-full bg-neutral-900 mr-2"></span> Terminal Sucursal
        </div>
    </header>

    <!-- Contenido Principal -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar de Navegación Lateral Sutil -->
        <aside class="w-80 bg-white border-r border-neutral-200 p-4 flex flex-col space-y-1.5 overflow-y-auto">
            <div class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest px-3 mb-3 mt-1">Manuales de Proceso</div>
            
            <button onclick="loadSOP('p01')" id="btn-p01" class="w-full text-left px-4 py-3 rounded border border-neutral-100 bg-neutral-50 text-neutral-700 hover:bg-[#E6D5C3]/30 hover:text-black flex items-center space-x-3 transition font-medium">
                <span class="font-bold text-[10px] text-neutral-900 bg-[#E6D5C3] px-1.5 py-0.5 rounded">P-01</span>
                <span class="text-xs truncate tracking-wide">Atención al Cliente y Ventas</span>
            </button>

            <button onclick="loadSOP('p02')" id="btn-p02" class="w-full text-left px-4 py-3 rounded border border-neutral-100 bg-neutral-50 text-neutral-700 hover:bg-[#E6D5C3]/30 hover:text-black flex items-center space-x-3 transition font-medium">
                <span class="font-bold text-[10px] text-neutral-900 bg-[#E6D5C3] px-1.5 py-0.5 rounded">P-02</span>
                <span class="text-xs truncate tracking-wide">Operación de Caja y Pagos</span>
            </button>

            <button onclick="loadSOP('p03')" id="btn-p03" class="w-full text-left px-4 py-3 rounded border border-neutral-100 bg-neutral-50 text-neutral-700 hover:bg-[#E6D5C3]/30 hover:text-black flex items-center space-x-3 transition font-medium">
                <span class="font-bold text-[10px] text-neutral-900 bg-[#E6D5C3] px-1.5 py-0.5 rounded">P-03</span>
                <span class="text-xs truncate tracking-wide">Orden y Estética del Local</span>
            </button>

            <button onclick="loadSOP('p04')" id="btn-p04" class="w-full text-left px-4 py-3 rounded border border-neutral-100 bg-neutral-50 text-neutral-700 hover:bg-[#E6D5C3]/30 hover:text-black flex items-center space-x-3 transition font-medium">
                <span class="font-bold text-[10px] text-neutral-900 bg-[#E6D5C3] px-1.5 py-0.5 rounded">P-04</span>
                <span class="text-xs truncate tracking-wide">Posventa y Cambios</span>
            </button>

            <button onclick="loadSOP('p05')" id="btn-p05" class="w-full text-left px-4 py-3 rounded border border-neutral-100 bg-neutral-50 text-neutral-700 hover:bg-[#E6D5C3]/30 hover:text-black flex items-center space-x-3 transition font-medium">
                <span class="font-bold text-[10px] text-neutral-900 bg-[#E6D5C3] px-1.5 py-0.5 rounded">P-05</span>
                <span class="text-xs truncate tracking-wide">Recepción y Stock</span>
            </button>

            <button onclick="loadSOP('p06')" id="btn-p06" class="w-full text-left px-4 py-3 rounded border border-neutral-100 bg-neutral-50 text-neutral-700 hover:bg-[#E6D5C3]/30 hover:text-black flex items-center space-x-3 transition font-medium">
                <span class="font-bold text-[10px] text-neutral-900 bg-[#E6D5C3] px-1.5 py-0.5 rounded">P-06</span>
                <span class="text-xs truncate tracking-wide">Gestión de Gift Cards</span>
            </button>

            <button onclick="loadSOP('p07')" id="btn-p07" class="w-full text-left px-4 py-3 rounded border border-neutral-100 bg-neutral-50 text-neutral-700 hover:bg-[#E6D5C3]/30 hover:text-black flex items-center space-x-3 transition font-medium">
                <span class="font-bold text-[10px] text-neutral-900 bg-[#E6D5C3] px-1.5 py-0.5 rounded">P-07</span>
                <span class="text-xs truncate tracking-wide">Venta Activa y Omnicanalidad</span>
            </button>
        </aside>

        <!-- Contenedor del Documento -->
        <main class="flex-1 bg-[#FAF9F6] p-8 flex justify-center overflow-y-auto">
            <!-- Simulación de hoja física corporativa premium -->
            <div id="sop-view-card" class="bg-white text-neutral-900 w-full max-w-[820px] min-h-[1123px] shadow-sm rounded border border-neutral-200 p-[60px] hidden relative">
                <!-- Sutil acento superior color madera clara que simula la terminación del local -->
                <div class="absolute top-0 left-0 right-0 h-1.5 bg-[#E6D5C3]"></div>
                <div id="sop-content" class="sop-container">
                    <!-- Contenido dinámico -->
                </div>
            </div>

            <!-- Estado Inicial -->
            <div id="welcome-card" class="flex flex-col items-center justify-center text-center max-w-sm mx-auto space-y-3">
                <div class="text-neutral-300 text-4xl">▪</div>
                <h2 class="text-sm font-bold text-black tracking-wider uppercase">Portal Operativo Nazaria</h2>
                <p class="text-xs text-neutral-500 leading-relaxed">Seleccioná un procedimiento operativo desde el panel lateral para consultar el estándar oficial vigente.</p>
            </div>

            <!-- Loader de carga -->
            <div id="loader" class="hidden flex flex-col items-center justify-center text-center max-w-md mx-auto space-y-2">
                <div class="w-5 h-5 border-2 border-neutral-900 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-[11px] text-neutral-500 tracking-wide">Sincronizando con base central...</p>
            </div>
        </main>
    </div>

    <script>
        let currentSopCode = null;

        async function loadSOP(sopCode) {
            currentSopCode = sopCode;
            const welcomeCard = document.getElementById('welcome-card');
            const sopViewCard = document.getElementById('sop-view-card');
            const loader = document.getElementById('loader');
            const sopContent = document.getElementById('sop-content');

            document.querySelectorAll('aside button').forEach(btn => {
                btn.classList.remove('bg-black', 'text-white', 'border-black');
                btn.classList.add('bg-neutral-50', 'text-neutral-700');
            });

            const activeBtn = document.getElementById(`btn-${sopCode}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-neutral-50', 'text-neutral-700');
                activeBtn.classList.add('bg-black', 'text-white', 'border-black');
            }

            welcomeCard.classList.add('hidden');
            sopViewCard.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`./sops/${sopCode}.html?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('SOP no disponible.');

                const htmlContent = await response.text();
                sopContent.innerHTML = htmlContent;
                
                loader.classList.add('hidden');
                sopViewCard.classList.remove('hidden');
            } catch (error) {
                loader.classList.add('hidden');
                sopContent.innerHTML = `
                    <h1 class="sop-title-1 text-neutral-900">Documento en Actualización</h1>
                    <p class="sop-text">El archivo <b>${sopCode.toUpperCase()}</b> está siendo migrado a la nueva base de datos estructurada. Consultar al administrador central.</p>
                `;
                sopViewCard.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
