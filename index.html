<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Operaciones - Manual de SOPs Oficiales</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Estructura de fuentes estricta del P-00 para la visualización del documento */
        .sop-container {
            font-family: 'Inter', sans-serif !important;
            line-height: 1.15 !important;
            color: #262626 !important;
            font-size: 11pt !important;
        }
        .sop-title-1 {
            font-family: 'Inter', sans-serif !important;
            font-size: 20pt !important;
            font-weight: bold !important;
            color: #000000 !important;
            margin-top: 0px !important;
            margin-bottom: 12pt !important;
            line-height: 1.15 !important;
        }
        .sop-title-2 {
            font-family: 'Inter', sans-serif !important;
            font-size: 14pt !important;
            font-weight: bold !important;
            color: #000000 !important;
            text-transform: uppercase !important;
            margin-top: 24pt !important;
            margin-bottom: 12pt !important;
            line-height: 1.15 !important;
        }
        .sop-title-3 {
            font-family: 'Inter', sans-serif !important;
            font-size: 12pt !important;
            font-weight: bold !important;
            color: #404040 !important;
            margin-top: 18pt !important;
            margin-bottom: 6pt !important;
            line-height: 1.15 !important;
        }
        .sop-text {
            margin-top: 0px !important;
            margin-bottom: 12pt !important;
            text-align: justify !important;
        }
        .sop-list {
            margin-top: 0px !important;
            margin-bottom: 12pt !important;
            padding-left: 20pt !important;
            list-style-type: none !important;
        }
        .sop-list-item {
            margin-bottom: 6pt !important;
            position: relative !important;
        }
        .sop-divider {
            border: none !important;
            border-top: 1px solid #e5e5e5 !important;
            margin-top: 24pt !important;
            margin-bottom: 24pt !important;
        }
        .sop-blockquote {
            margin-top: 0px !important;
            margin-bottom: 12pt !important;
            margin-left: 0px !important;
            margin-right: 0px !important;
            padding-left: 12pt !important;
            border-left: 3px solid #d4d4d4 !important;
            font-style: italic !important;
            color: #525252 !important;
        }
        .sop-warning-list {
            margin-top: 0px !important;
            margin-bottom: 12pt !important;
            padding-left: 20pt !important;
            list-style-type: none !important;
        }
        .sop-warning-item {
            margin-bottom: 8pt !important;
            color: #b91c1c !important;
            font-weight: 500 !important;
        }
    </style>
</head>
<body class="bg-slate-900 font-['Inter'] text-slate-100 min-h-screen flex flex-col">

    <!-- Header Principal -->
    <header class="bg-slate-950 border-b border-slate-800 px-6 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="bg-emerald-500 text-slate-950 p-2 rounded-lg font-bold tracking-wider text-sm shadow-md shadow-emerald-500/20">
                NZ
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight text-white flex items-center">
                    NAZARIA <span class="ml-2 text-xs font-semibold bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/20">CENTRAL</span>
                </h1>
                <p class="text-xs text-slate-400">Manuales de Procedimientos Operativos Estándar</p>
            </div>
        </div>
        <div class="text-xs text-slate-400 bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-full flex items-center">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse mr-2"></span> Terminal Sucursal
        </div>
    </header>

    <!-- Contenido Principal -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar de Navegación Lateral -->
        <aside class="w-80 bg-slate-950 border-r border-slate-800 p-4 flex flex-col space-y-2 overflow-y-auto">
            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider px-3 mb-2">Procedimientos Oficiales</div>
            
            <button onclick="loadSOP('p01')" id="btn-p01" class="w-full text-left px-4 py-3 rounded-xl transition duration-200 border border-transparent bg-slate-900 text-slate-300 hover:bg-slate-800/60 hover:text-white flex items-center space-x-3">
                <span class="font-bold text-xs text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/10">P-01</span>
                <span class="text-sm font-medium truncate">Atención al Cliente y Ventas</span>
            </button>

            <button onclick="loadSOP('p02')" id="btn-p02" class="w-full text-left px-4 py-3 rounded-xl transition duration-200 border border-transparent bg-slate-900 text-slate-300 hover:bg-slate-800/60 hover:text-white flex items-center space-x-3">
                <span class="font-bold text-xs text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/10">P-02</span>
                <span class="text-sm font-medium truncate">Apertura, Cierre y Arqueo de Caja</span>
            </button>

            <button onclick="loadSOP('p03')" id="btn-p03" class="w-full text-left px-4 py-3 rounded-xl transition duration-200 border border-transparent bg-slate-900 text-slate-300 hover:bg-slate-800/60 hover:text-white flex items-center space-x-3">
                <span class="font-bold text-xs text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/10">P-03</span>
                <span class="text-sm font-medium truncate">Gestión de Stock y Depósito</span>
            </button>

            <button onclick="loadSOP('p04')" id="btn-p04" class="w-full text-left px-4 py-3 rounded-xl transition duration-200 border border-transparent bg-slate-900 text-slate-300 hover:bg-slate-800/60 hover:text-white flex items-center space-x-3">
                <span class="font-bold text-xs text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/10">P-04</span>
                <span class="text-sm font-medium truncate">Cambios y Devoluciones</span>
            </button>

            <button onclick="loadSOP('p05')" id="btn-p05" class="w-full text-left px-4 py-3 rounded-xl transition duration-200 border border-transparent bg-slate-900 text-slate-300 hover:bg-slate-800/60 hover:text-white flex items-center space-x-3">
                <span class="font-bold text-xs text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/10">P-05</span>
                <span class="text-sm font-medium truncate">Mantenimiento y Visual Merchandising</span>
            </button>

            <button onclick="loadSOP('p06')" id="btn-p06" class="w-full text-left px-4 py-3 rounded-xl transition duration-200 border border-transparent bg-slate-900 text-slate-300 hover:bg-slate-800/60 hover:text-white flex items-center space-x-3">
                <span class="font-bold text-xs text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/10">P-06</span>
                <span class="text-sm font-medium truncate">Uso de Sistemas y Facturación</span>
            </button>

            <button onclick="loadSOP('p07')" id="btn-p07" class="w-full text-left px-4 py-3 rounded-xl transition duration-200 border border-transparent bg-slate-900 text-slate-300 hover:bg-slate-800/60 hover:text-white flex items-center space-x-3">
                <span class="font-bold text-xs text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/10">P-07</span>
                <span class="text-sm font-medium truncate">Venta Activa y Omnicanalidad</span>
            </button>
        </aside>

        <!-- Contenedor del Documento -->
        <main class="flex-1 bg-slate-900 p-8 flex justify-center overflow-y-auto">
            <!-- Simulación de hoja física A4 en blanco según estándar P-00 -->
            <div id="sop-view-card" class="bg-white text-neutral-900 w-full max-w-[800px] min-h-[1123px] shadow-2xl rounded-2xl p-[50px] border border-slate-200 hidden transition-opacity duration-200 overflow-hidden relative">
                <div id="sop-content" class="sop-container">
                    <!-- El contenido del SOP se inyecta dinámicamente acá -->
                </div>
            </div>

            <!-- Estado Inicial: Pantalla de Bienvenida -->
            <div id="welcome-card" class="flex flex-col items-center justify-center text-center max-w-md mx-auto space-y-4">
                <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800 shadow-xl">
                    📁
                </div>
                <h2 class="text-xl font-bold text-white">Centro de Operaciones Nazaria</h2>
                <p class="text-sm text-slate-400 leading-relaxed">Seleccioná un procedimiento de la barra lateral para visualizar el manual técnico oficial de la sucursal.</p>
            </div>

            <!-- Loader de carga -->
            <div id="loader" class="hidden flex flex-col items-center justify-center text-center max-w-md mx-auto space-y-3">
                <div class="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-sm text-slate-400">Sincronizando manual desde la nube...</p>
            </div>
        </main>
    </div>

    <!-- Script de Lógica Dinámica Asincrónica -->
    <script>
        let currentSopCode = null;

        async function loadSOP(sopCode) {
            currentSopCode = sopCode;
            const welcomeCard = document.getElementById('welcome-card');
            const sopViewCard = document.getElementById('sop-view-card');
            const loader = document.getElementById('loader');
            const sopContent = document.getElementById('sop-content');

            // 1. Resetear UI de botones laterales
            document.querySelectorAll('aside button').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'text-white', 'border-emerald-500/30');
                btn.classList.add('bg-slate-900', 'text-slate-300');
            });

            // 2. Activar botón seleccionado
            const activeBtn = document.getElementById(`btn-${sopCode}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-900', 'text-slate-300');
                activeBtn.classList.add('bg-emerald-600', 'text-white', 'border-emerald-500/30');
            }

            // 3. Mostrar Loader operativo
            welcomeCard.classList.add('hidden');
            sopViewCard.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                // Buscamos el archivo de forma dinámica a la carpeta /sops relativa en el hosting de Netlify
                const response = await fetch(`./sops/${sopCode}.html?t=${new Date().getTime()}`);
                
                if (!response.ok) {
                    throw new Error('SOP no configurado o no disponible en la carpeta /sops.');
                }

                const htmlContent = await response.text();
                
                // Inyectamos el contenido dentro de la hoja virtual
                sopContent.innerHTML = htmlContent;
                
                // Mostrar la hoja física
                loader.classList.add('hidden');
                sopViewCard.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                loader.classList.add('hidden');
                sopContent.innerHTML = `
                    <h1 class="sop-title-1 text-red-600">Error de Sincronización</h1>
                    <p class="sop-text">No se pudo cargar el manual seleccionado (<b>${sopCode.toUpperCase()}</b>). Es probable que el archivo aún no esté subido en la carpeta <b>/sops</b> del repositorio de GitHub.</p>
                `;
                sopViewCard.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
