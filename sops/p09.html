<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-09 · Promociones Activas</title>
    <style>
        /* Desactivamos el posicionamiento fijo para no invadir el menú lateral */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: transparent;
        }

        /* Forzamos al contenedor estilo "hoja A4" a expandirse al 100% del espacio libre */
        [class*="container"], [class*="card"], .content, main {
            max-width: 100% !important;
            width: 100% !important;
            padding: 0 !important;
            box-shadow: none !important;
            background: transparent !important;
        }

        /* Contenedor adaptativo para la planilla */
        .promos-fluid-container {
            width: 100%;
            height: 82vh; /* Altura optimizada para la resolución de las cajas */
            margin: 0;
            padding: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="promos-fluid-container">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQkz7Ir_NGsJ3GYgxB1VT-690Za3piPy0CCBTdGJhnWR3e-t6kKF0XBHWH_vN4ac3oDf_GV-ywZaXq2/pubhtml?gid=0&amp;single=true&amp;widget=true&amp;headers=false"></iframe>
    </div>
</body>
</html>
