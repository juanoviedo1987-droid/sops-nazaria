<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-09 · Promociones Activas</title>
    <style>
        /* Forzamos al contenedor de la web a romper sus márgenes fijos */
        :global(.container), [class*="container"], body, html {
            max-width: 100% !important;
            width: 100% !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        
        .wrapper-promos {
            position: fixed;
            top: 60px; /* Ajuste para no tapar la barra superior de Nazaria */
            left: 260px; /* Ajuste para no tapar el menú lateral izquierdo */
            right: 0;
            bottom: 0;
            overflow: hidden;
            background-color: #ffffff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="wrapper-promos">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQkz7Ir_NGsJ3GYgxB1VT-690Za3piPy0CCBTdGJhnWR3e-t6kKF0XBHWH_vN4ac3oDf_GV-ywZaXq2/pubhtml?gid=0&amp;single=true&amp;widget=true&amp;headers=false"></iframe>
    </div>
</body>
</html>
